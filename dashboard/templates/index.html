<!DOCTYPE html>
<html>
<head>
    <title>Container Security Monitor</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        .btn {
            padding: 10px 20px;
            margin: 10px;
            background: #f0b90b;
            border: none;
            cursor: pointer;
        }
        .alert {
            background: #1f2937;
            padding: 10px;
            margin: 10px 0;
            border-left: 5px solid red;
        }
.alert {
    background: #1f2937;
    padding: 10px;
    margin: 10px 0;
    border-left: 5px solid red;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { border-color: red; }
    50% { border-color: orange; }
    100% { border-color: red; }
}
    </style>
</head>

<body>

<h1>🛡 Container Security Monitor</h1>
<p>Privileged Container Abuse — Attack & Detection Demo</p>

<button class="btn" onclick="attack()">Simulate Attack</button>
<button class="btn" onclick="loadAlerts()">Refresh Alerts</button>

<h3>Total Attacks: <span id="count">0</span></h3>

<h2>Live Alerts:</h2>
<div id="alerts"></div>

<script>
const API = "";

async function attack() {
    await fetch(API + "/run-attack");
}

async function loadAlerts() {
    const res = await fetch(API + "/alerts");
    const data = await res.json();

    document.getElementById("count").innerText = data.alerts.length;

    const box = document.getElementById("alerts");

    if (data.alerts.length === 0) {
        box.innerHTML = "No alerts yet...";
        return;
    }

    box.innerHTML = data.alerts.map(a => `
        <div class="alert">
            <strong>${a.rule}</strong><br>
            Priority: ${a.priority}<br>
            ${a.message}<br>
            Time: ${a.time}
        </div>
    `).join("");
}

setInterval(loadAlerts, 2000);
window.onload = loadAlerts;
</script>

</body>
